<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>repetidor de texto</title>
</head>

<style>
*:not(input, texarea) {
	text-transform: uppercase;
	font-size: 25px;
}

body {
    background-color: #f8f9fa;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.pai {
    background-color: #ffffff;
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    text-align: center;
    width: 90%;
    max-width: 300px;
}

h1 {
    color: #333;
    font-weight: 300;
    margin-bottom: 1.5rem;
}

mark {
    background-color: transparent;
    color: #007bff;
    font-weight: 700;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 1rem;
    border: 1px solid #ddd;
    border-radius: 6px;
    box-sizing: border-box;
    outline: none;
    transition: border-color 0.3s;
}

input:focus {
    border-color: #007bff;
}

textarea {
    width: 100%;
    height: 120px;
    padding: 12px;
    margin-bottom: 1rem;
    border: 1px solid #eee;
    border-radius: 6px;
    background-color: #fdfdfd;
    resize: none;
    box-sizing: border-box;
    color: #666;
}

button {
    width: 100%;
    padding: 12px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.3s, transform 0.1s;
}

button:hover {
    background-color: #0056b3;
}

button:active {
    transform: scale(0.98);
}
.popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1000;
    width: 90%;
    max-width: 450px;
    padding: 25px;
    background-color: #ffffff;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    font-family: sans-serif;
    text-align: center;
    border: 1px solid #eee;
    animation: popup-show 0.3s ease-out;
}

@keyframes popup-show {
    from { 
        opacity: 0; 
        transform: translate(-50%, -45%); 
    }
    to { 
        opacity: 1; 
        transform: translate(-50%, -50%); 
    }
}
.hidden {
    display: none !important;
}

body.dark-theme {
    background-color: #121212;
    color: #e0e0e0;
}

body.dark-theme .pai {
    background-color: #1e1e1e;
    border: 1px solid #333;
}

body.dark-theme input, 
body.dark-theme textarea {
    background-color: #2d2d2d;
    color: #fff;
    border-color: #444;
}

body.dark-theme .popup {
    background-color: #2a2a2a;
    color: #fff;
}
</style>

<body>
	<div class="pai">
		<div class="popup"><h1>Desculpe, posso repetir apenas 2000 mil vezes</h1></div>
		<div><h1><mark>repetidor</mark> de texto</h1></div>
		<div>
			<input type="texto" placeholder="TEXTO..." class="texto"> 
			<input type="number" placeholder="QUANTIDADE..." class="quantidade">
			<textarea placeholder="o texto aparecerá aqui..." class="espaco"></textarea>
			<button onclick="repetir()">repetir</button> 
		</div>
	</div>
</body>

<script>
	let result = '';
	const popup = document.querySelector('.popup')
	function fecharpopup() {
		popup.classList.add('hidden')
	}

	function abrirpopup() {
		popup.classList.remove('hidden')
	}

	function darktheme() {
		document.body.classList.toggle('dark-theme')
	}
	fecharpopup()
	function repetir() {
		let qtd = document.querySelector('.quantidade')
		let texto = document.querySelector('.texto').value;
		let espaco = document.querySelector('.espaco');
		result = ''
		if (qtd.value >= 2000) {
			abrirpopup();
			setTimeout(fecharpopup, 2000);
		} else {
			for (var palavra = 0; palavra <= qtd.value; palavra++) {
				result += texto + '\n';
			}
			result = result 
			espaco.value = result;
		}
		if (texto == 'change') {
			darktheme()
			fecharpopup()
		}
	}
</script>

</html>
